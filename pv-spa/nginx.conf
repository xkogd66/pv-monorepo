user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Map to exclude health check logs
    map $request_uri $loggable {
        ~^/$              0;  # Don't log health checks to root
        ~^/health$        0;  # Don't log health checks to /health
        default           1;
    }

    # Also check user agent for k8s health checks
    map $http_user_agent $k8s_healthcheck {
        ~k8s-healthcheck  0;
        default           1;
    }

    # Combined condition - log only if both conditions are true
    map "$loggable:$k8s_healthcheck" $should_log {
        "1:1"   1;
        default 0;
    }

    access_log /var/log/nginx/access.log main if=$should_log;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint for the SPA container itself
        location /health {
           return 200 "OK\n";
           add_header Content-Type text/plain;
        }

        # Proxy API calls to the backend service so that requests are never
        # handled by try_files (which returns 405 for POST requests).
        location ~ ^/(auth|user|album|albums|objects|stats|bulk|buckets)(/.*)?$ {
            proxy_pass http://pv-api-service$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 100m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # SSE endpoint — needs extended timeout and no buffering
        location /processing-status/ {
            proxy_pass http://pv-api-service/processing-status/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # Handle Vue.js routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Runtime config must never be cached — it contains the API URL
        location = /env-config.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
