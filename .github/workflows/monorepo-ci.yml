name: Monorepo CI Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild/redeploy all services (no source diff needed)"
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pv-spa
            path: pv-spa
            context: pv-spa
            image: ghcr.io/xkogd66/pv-spa
            deployment: pv-spa
            container: pv-spa
            manifests_dir: k8s/base/pv-spa
          - name: pv-api
            path: pv-api
            context: pv-api
            image: ghcr.io/xkogd66/pv-api
            deployment: pv-api
            container: pv-api
            manifests_dir: k8s/base/pv-api
          - name: pv-converter
            path: pv-converter
            context: pv-converter
            image: ghcr.io/xkogd66/pv-converter
            deployment: pv-avif-converter
            container: pv-avif-converter
            manifests_dir: k8s/base/pv-converter
          # --- NEW METADATA SERVICE ---
          - name: pv-metadata
            path: pv-metadata
            context: pv-metadata
            image: ghcr.io/xkogd66/pv-metadata
            deployment: pv-metadata
            container: pv-metadata
            manifests_dir: k8s/base/pv-metadata
          # ----------------------------
          - name: pv-temporal-worker
            path: pv-temporal-worker
            context: pv-temporal-worker/worker
            image: ghcr.io/xkogd66/pv-worker
            deployment: pv-worker
            container: worker
            manifests_dir: k8s/base/pv-temporal-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if service changed
        id: changed
        run: |
          echo "Checking for changes under '${{ matrix.path }}'"
          # Get list of changed files between previous commit and current SHA
          CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git show --pretty='' --name-only "${{ github.sha }}" || true)
          
          echo "files_changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          FORCE="${{ github.event_name == 'workflow_dispatch' && inputs.force }}"

          # Detect code changes in the service folder
          if [ "$FORCE" = "true" ] || echo "$CHANGED_FILES" | grep -E "^${{ matrix.path }}(/|$)" >/dev/null; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          # Detect manifest changes
          if [ "$FORCE" = "true" ] || echo "$CHANGED_FILES" | grep -E "^k8s/base/${{ matrix.name }}(/|$)" >/dev/null || \
             echo "$CHANGED_FILES" | grep -E "^${{ matrix.path }}/k8s(/|$)" >/dev/null; then
            echo "manifests_changed=true" >> $GITHUB_OUTPUT
          else
            echo "manifests_changed=false" >> $GITHUB_OUTPUT
          fi

          # Worker dependency logic
          if echo "$CHANGED_FILES" | grep -E "^(pv-api/|k8s/base/pv-api/)" >/dev/null; then
            echo "api_related_changed=true" >> $GITHUB_OUTPUT
          else
            echo "api_related_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set short SHA
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Check deploy prerequisites
        id: deploy
        if: steps.changed.outputs.changed == 'true' || steps.changed.outputs.manifests_changed == 'true' || (matrix.name == 'pv-temporal-worker' && steps.changed.outputs.api_related_changed == 'true')
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "has_kubeconfig=false" >> $GITHUB_OUTPUT
          else
            echo "has_kubeconfig=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
            ${{ matrix.image }}:latest

      - name: Prepare kubeconfig
        if: (steps.changed.outputs.changed == 'true' || steps.changed.outputs.manifests_changed == 'true' || (matrix.name == 'pv-temporal-worker' && steps.changed.outputs.api_related_changed == 'true')) && steps.deploy.outputs.has_kubeconfig == 'true'
        run: |
          if echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml 2>/dev/null; then
            echo "Decoded base64 kubeconfig"
          else
            echo "Using raw kubeconfig content"
            printf '%s' "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          fi
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Create or update runtime app secret
        id: runtime_app_secret
        if: (steps.changed.outputs.changed == 'true' || steps.changed.outputs.manifests_changed == 'true') && steps.deploy.outputs.has_kubeconfig == 'true' && (matrix.name == 'pv-api' || matrix.name == 'pv-temporal-worker')
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          kubectl create secret generic pv-api-secret \
            --from-literal=MINIO_ACCESS_KEY="$MINIO_ACCESS_KEY" \
            --from-literal=MINIO_SECRET_KEY="$MINIO_SECRET_KEY" \
            --from-literal=MAPBOX_TOKEN="$MAPBOX_TOKEN" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --namespace=pv \
            --kubeconfig=kubeconfig.yaml \
            --dry-run=client -o yaml | kubectl apply -f - --kubeconfig=kubeconfig.yaml

      - name: Apply manifests
        if: (steps.changed.outputs.changed == 'true' || steps.changed.outputs.manifests_changed == 'true' || (matrix.name == 'pv-temporal-worker' && steps.changed.outputs.api_related_changed == 'true')) && steps.deploy.outputs.has_kubeconfig == 'true'
        run: |
          MANIFEST_DIR="${{ matrix.manifests_dir }}"
          if [ ! -d "$MANIFEST_DIR" ]; then echo "No manifests found"; exit 0; fi

          for manifest in "$MANIFEST_DIR"/*.yaml; do
            [ -e "$manifest" ] || continue
            filename=$(basename "$manifest")
            
            # Special logic for worker-only changes
            if [ "${{ matrix.name }}" = "pv-temporal-worker" ] && [ "${{ steps.changed.outputs.changed }}" = "false" ] && [ "$filename" = "worker-deployment.yaml" ]; then
              continue
            fi

            if [[ "$filename" != *"secret"* ]]; then
              kubectl apply -f "$manifest" --kubeconfig=kubeconfig.yaml --namespace=pv
            fi
          done

      - name: Update deployment image
        if: steps.changed.outputs.changed == 'true' && steps.deploy.outputs.has_kubeconfig == 'true' && matrix.deployment != ''
        run: |
          IMAGE=${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
          kubectl set image deployment/${{ matrix.deployment }} \
            ${{ matrix.container }}=$IMAGE \
            --namespace=pv \
            --kubeconfig=kubeconfig.yaml

      - name: Wait for rollout
        if: (steps.changed.outputs.changed == 'true' || steps.changed.outputs.manifests_changed == 'true') && steps.deploy.outputs.has_kubeconfig == 'true' && matrix.deployment != ''
        run: |
          kubectl rollout status deployment/${{ matrix.deployment }} --namespace=pv --kubeconfig=kubeconfig.yaml --timeout=600s

      - name: Cleanup
        if: always()
        run: rm -f kubeconfig.yaml || true