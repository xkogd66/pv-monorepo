apiVersion: v1
kind: ConfigMap
metadata:
  name: pv-api-config
  namespace: pv
data:
  PORT: "3000"
  NODE_ENV: "production"
  DEBUG: "pv:*,-pv:sse*,-pv:server:sse,-express:*,-nodemon:*,-express-router:*"
  API_PREFIX: "/api/v1"
  AUTH_MODE: "jwt"
  JWT_EXPIRES_IN: "24h"
  # AVIF Converter Services
  AVIF_CONVERTER_URL: "http://pv-avif-converter-service.pv.svc.cluster.local:3000"
  AVIF_CONVERTER_TIMEOUT: "300000"

  # MinIO Connection (non-sensitive)
  MINIO_ENDPOINT: "mjolnir"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_BUCKET_NAME: "photovault"
  # Public MinIO URL for browser-to-MinIO presigned video uploads (bypasses proxy size limits).
  MINIO_PUBLIC_URL: "https://objects.ekskog.net"

  # Temporal Configuration
  # This points to the Temporal Frontend service in your cluster
  TEMPORAL_ADDRESS: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "photovault"
  TASK_QUEUE: "pv-image-processing"

  # Database Connection (non-sensitive)
  DB_HOST: "mariadb.data.svc.cluster.local"
  DB_PORT: "3306"
  DB_USER: "pv_app"
  DB_NAME: "photovault"
  
  # NFS Storage Path
  # This must match the mountPath in your Deployment's volumeMounts
  NFS_PATH: "/nfs-storage"
