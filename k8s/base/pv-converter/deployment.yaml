apiVersion: apps/v1
kind: Deployment
metadata:
  name: pv-avif-converter
  namespace: pv
  labels:
    app: pv-avif-converter
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pv-avif-converter
  template:
    metadata:
      labels:
        app: pv-avif-converter
    spec:
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "avif-converter"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thinkpad
      hostAliases:
        - hostnames:
            - mjolnir
          ip: 192.168.1.8
      volumes:
        - name: nfs-storage
          persistentVolumeClaim:
            claimName: nfs-pv-claim
      containers:
        - name: pv-avif-converter
          image: ghcr.io/xkogd66/pv-converter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: pv-api-secret
          env:
            - name: MINIO_ENDPOINT
              value: "192.168.1.8:9000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - mountPath: /nfs-storage
              name: nfs-storage
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
            successThreshold: 1